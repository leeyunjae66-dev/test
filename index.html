
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 설문조사</title>
  <link rel="stylesheet" href="partnership.css">
</head>
<body>
  <main class="wrap">
    <section class="card" aria-labelledby="survey-title">
      <h1 id="survey-title">제휴 설문조사</h1>
      <p>아래 설문에 응답해 주시면 검토 후 연락드리겠습니다.</p>

      <form action="https://formspree.io/f/xgonvnkp" method="POST" class="form">
        <input type="hidden" name="_subject" value="새 제휴 설문 응답">
        <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off">

        <label for="name">담당자명</label>
        <input id="name" name="name" type="text" required>

        <label for="email">이메일</label>
        <input id="email" name="email" type="email" required>

        <label for="company">회사명</label>
        <input id="company" name="company" type="text" required>

        <label for="partner-type">희망 제휴 형태</label>
        <input id="partner-type" name="partner_type" type="text" placeholder="예: 공동 마케팅, 콘텐츠 제휴" required>

        <label for="message">기타 의견</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">설문 제출</button>
      </form>
    </section>
  </main>
</body>
</html>
