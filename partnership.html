<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의</title>
  <link rel="stylesheet" href="partnership.css">
</head>
<body>
  <main class="wrap">
    <section class="card" aria-labelledby="partnership-title">
      <h1 id="partnership-title">제휴 문의</h1>
      <p>아래 내용을 작성해 주시면 확인 후 연락드리겠습니다.</p>

      <form action="https://formspree.io/f/xgonvnkp" method="POST" class="form">
        <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다">
        <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off">

        <label for="name">담당자명</label>
        <input id="name" name="name" type="text" required>

        <label for="email">이메일</label>
        <input id="email" name="email" type="email" required>

        <label for="company">회사명</label>
        <input id="company" name="company" type="text" required>

        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">문의 보내기</button>
      </form>
    </section>
  </main>
</body>
</html>
